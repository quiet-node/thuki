name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Open Thuki with ...
        2. Type ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: e.g. macOS Sequoia 15.4
    validations:
      required: true

  - type: input
    id: thuki-version
    attributes:
      label: Thuki Version
      placeholder: e.g. v0.1.0 (from the tray menu or GitHub Releases)
    validations:
      required: true

  - type: input
    id: ollama-version
    attributes:
      label: Ollama Version
      placeholder: e.g. 0.6.5 (run `ollama --version`)
    validations:
      required: false

  - type: dropdown
    id: backend
    attributes:
      label: AI Backend
      description: Are you running Ollama locally or via the Docker sandbox?
      options:
        - Local Ollama
        - Docker sandbox
        - Not sure
    validations:
      required: true
