name: Backend Tests

on:
  workflow_call:
    inputs:
      head_ref:
        description: 'The head ref of the PR'
        required: false
        type: string

jobs:
  test:
    name: Backend Tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.head_ref || github.head_ref }}
          fetch-depth: 1

      - name: Install nightly Rust toolchain
        run: rustup toolchain install nightly-2026-03-30 --component llvm-tools --no-self-update

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9  # v2.82.2
        with:
          tool: cargo-llvm-cov

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache llama.cpp sidecar
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: src-tauri/binaries
          key: llama-cpp-${{ runner.os }}-b9590-b12cb8851ea60433

      - name: Fetch llama-server sidecar
        run: bun run engine:ensure

      - name: Run backend tests with coverage
        working-directory: src-tauri
        run: |
          echo "Running Cargo tests with 100% line coverage enforcement..."
          cargo +nightly-2026-03-30 llvm-cov --ignore-filename-regex "(lib|main)\.rs" --fail-under-lines 100
