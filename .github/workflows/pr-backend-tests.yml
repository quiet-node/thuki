name: Backend Tests

on:
  workflow_call:
    inputs:
      head_ref:
        description: 'The head ref of the PR'
        required: false
        type: string

jobs:
  test:
    name: Backend Tests
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.head_ref || github.head_ref }}
          fetch-depth: 1

      - name: Install nightly Rust toolchain
        run: rustup toolchain install nightly-2026-03-30 --component llvm-tools --no-self-update

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6  # v2.82.6
        with:
          tool: cargo-llvm-cov

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache llama.cpp sidecar
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: src-tauri/binaries
          key: llama-cpp-${{ runner.os }}-b9781-51eae8cf-macos13.4

      - name: Build llama-server sidecar
        run: bun run engine:ensure

      - name: Run backend tests with coverage
        working-directory: src-tauri
        run: |
          echo "Running Cargo tests with 100% line coverage enforcement..."
          cargo +nightly-2026-03-30 llvm-cov --ignore-filename-regex "(lib|main)\.rs" --fail-under-lines 100
