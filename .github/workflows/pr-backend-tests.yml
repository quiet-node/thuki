name: Backend Tests

on:
  workflow_call:
    inputs:
      head_ref:
        description: 'The head ref of the PR'
        required: false
        type: string
      event_name:
        description: 'The event name'
        required: false
        type: string

jobs:
  test:
    name: Backend Tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_ref || github.head_ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install nightly Rust toolchain
        run: rustup toolchain install nightly --no-self-update

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run backend tests with coverage
        working-directory: src-tauri
        run: |
          echo "Running Cargo tests with 100% line coverage enforcement..."
          cargo +nightly llvm-cov --ignore-filename-regex "(lib|main)\.rs" --fail-under-lines 100
