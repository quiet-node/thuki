name: Build Validation

on:
  workflow_call:
    inputs:
      head_ref:
        description: 'The head ref of the PR'
        required: false
        type: string

jobs:
  build:
    name: Build Validation
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.head_ref || github.head_ref }}
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache llama.cpp sidecar
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: src-tauri/binaries
          key: llama-cpp-${{ runner.os }}-b9590-b12cb8851ea60433

      - name: Fetch llama-server sidecar
        run: bun run engine:ensure

      - name: Security vulnerability scan
        run: |
          AUDIT=$(bun audit 2>&1 || true)
          echo "$AUDIT"
          if echo "$AUDIT" | grep -qE '\b(critical|high)\b'; then
            echo "::error::High or critical severity vulnerabilities found. Fix before merging."
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Frontend build
        run: bun run build:frontend
