name: Build Validation

on:
  workflow_call:
    inputs:
      head_ref:
        description: 'The head ref of the PR'
        required: false
        type: string

jobs:
  build:
    name: Build Validation
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: ${{ inputs.head_ref || github.head_ref }}
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache llama.cpp sidecar
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: src-tauri/binaries
          key: llama-cpp-${{ runner.os }}-${{ hashFiles('scripts/ensure-llama-server.ts') }}

      - name: Build llama-server sidecar
        run: bun run engine:ensure

      - name: Security vulnerability scan
        run: |
          AUDIT=$(bun audit 2>&1 || true)
          echo "$AUDIT"
          if echo "$AUDIT" | grep -qE '\b(critical|high)\b'; then
            echo "::error::High or critical severity vulnerabilities found. Fix before merging."
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Frontend build
        run: bun run build:frontend
