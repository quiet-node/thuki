name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open or update release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f  # v4.1.3
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-release:
    name: Build and publish macOS app
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install stable Rust toolchain
        run: rustup toolchain install stable --no-self-update

      - name: Install nightly Rust toolchain
        run: rustup toolchain install nightly-2026-03-30 --component llvm-tools --no-self-update

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df  # v2.70.3
        with:
          tool: cargo-llvm-cov

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run lint && bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Run all tests with coverage enforcement
        run: bun run test:all:coverage

      - name: Build frontend
        run: bun run build:frontend

      - name: Build Tauri app
        run: bun run build:backend

      - name: Ad-hoc sign the app
        run: |
          codesign --deep --force --sign - src-tauri/target/release/bundle/macos/Thuki.app
          codesign --verify --verbose src-tauri/target/release/bundle/macos/Thuki.app

      - name: Create release archive
        run: |
          cd src-tauri/target/release/bundle/macos
          tar -czf Thuki.app.tar.gz Thuki.app

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            src-tauri/target/release/bundle/macos/Thuki.app.tar.gz
